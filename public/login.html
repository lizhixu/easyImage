<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - Node EasyImage</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <svg aria-hidden="true" class="svg-sprite">
      <symbol id="i-home" viewBox="0 0 24 24"><path d="m4 11 8-7 8 7"/><path d="M6 10v10h12V10"/><path d="M10 20v-6h4v6"/></symbol>
      <symbol id="i-log-in" viewBox="0 0 24 24"><path d="M14 6h4v12h-4"/><path d="m10 8 4 4-4 4"/><path d="M4 12h10"/></symbol>
    </svg>

    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="/">
          <img class="brand-logo" src="/logo.png" alt="">
          EasyImage
        </a>
        <div class="login-heading">
          <h1>管理员登录</h1>
          <p>登录后进入后台管理存储配置和文件记录。</p>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            <span>用户名</span>
            <input name="username" autocomplete="username" placeholder="admin">
          </label>
          <label>
            <span>密码</span>
            <input name="password" autocomplete="current-password" placeholder="请输入密码" type="password">
          </label>
          <button class="btn primary" type="submit"><svg class="icon"><use href="#i-log-in"></use></svg>登录</button>
        </form>
        <a class="login-home" href="/"><svg class="icon"><use href="#i-home"></use></svg>返回首页</a>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="/login.js" type="module"></script>
  </body>
</html>
